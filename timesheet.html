// ─── ユーティリティ ───
const toMin  = t => { if(!t)return null; const[h,m]=t.split(":").map(Number); return h*60+m; };
const toHHMM = m => { if(m==null||m<0)m=0; return Math.floor(m/60)+":"+String(m%60).padStart(2,"0"); };
const floor30 = m => Math.floor(m/30)*30;
const isHoliday = d => HOLIDAYS.has(d);
const isWeekend = d => { const w=new Date(d).getDay(); return w===0||w===6; };
const isNonWorkday = d => isWeekend(d)||isHoliday(d);
const fmtDate = d => { const dt=new Date(d),days=["日","月","火","水","木","金","土"]; return (dt.getMonth()+1)+"/"+(dt.getDate())+"（"+days[dt.getDay()]+"）"; };
const nowRounded30 = () => {
  const n=new Date(), total=n.getHours()*60+n.getMinutes(), r=Math.round(total/30)*30;
  return String(Math.floor(r/60)%24).padStart(2,"0")+":"+String(r%60).padStart(2,"0");
};

function lateNightOverlap(inM,outM){
  return [[0,300],[1320,1740]].reduce((s,[a,b])=>s+Math.max(0,Math.min(outM,b)-Math.max(inM,a)),0);
}

function calcDay(inT,outT,date,absent){
  const hol=isHoliday(date),wknd=isWeekend(date),nonwork=hol||wknd;
  if(absent) return {workMin:0,otMin:0,lnMin:0,holidayMin:0,absentDeduct:nonwork?0:STD_WORK_MIN};
  if(!inT||!outT) return null;
  let inM=toMin(inT),outM=toMin(outT);
  if(outM<=inM) outM+=1440;
  const workMin=Math.max(0,outM-inM-BREAK_MIN);
  const lnMin=lateNightOverlap(inM,outM);
  let otMin=0,holidayMin=0;
  if(hol||wknd){ holidayMin=floor30(workMin); }
  else { otMin=floor30(Math.max(0,workMin-STD_WORK_MIN)); }
  return {workMin,otMin:floor30(otMin),lnMin:floor30(lnMin),holidayMin,absentDeduct:0};
}

// ─── 期間 ───
function getPeriodRange(ref){
  const d=new Date(ref),day=d.getDate(),m=d.getMonth(),y=d.getFullYear();
  let s,e;
  if(day<=CLOSING_DAY){s=new Date(m===0?y-1:y,m===0?11:m-1,26);e=new Date(y,m,25);}
  else{s=new Date(y,m,26);e=new Date(m===11?y+1:y,m===11?0:m+1,25);}
  return{s,e};
}
function getPeriodLabel(ref){
  const{s,e}=getPeriodRange(ref);
  const f=d=>d.getFullYear()+"年"+(d.getMonth()+1)+"月"+d.getDate()+"日";
  return f(s)+" 〜 "+f(e);
}
function getDates(ref){
  const{s,e}=getPeriodRange(ref),dates=[],cur=new Date(s);
  while(cur<=e){
    dates.push(cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0"));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}
function shiftRef(ref,dir){
  const{s}=getPeriodRange(ref);
  let m=s.getMonth()+dir,y=s.getFullYear();
  if(m>11){m-=12;y++;}if(m<0){m+=12;y--;}
  return y+"-"+String(m+1).padStart(2,"0")+"-26";
}

  try{ const r=localStorage.getItem(STORAGE_KEY); return r?JSON.parse(r):{}; }catch{return{};}

function save(data){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(data)); showSaved(); }
  catch(e){ console.error("保存失敗",e); }

  });
  // ストレージで上書き（ユーザー入力を優先）
  Object.keys(stored).forEach(d=>{ records[d]=stored[d]; });
}

}

// ─── SELECT options ───
const IN_OPTS=Array.from({length:21},(_,i)=>{const h=Math.floor(i/2)+5,m=i%2===0?"00":"30";return String(h).padStart(2,"0")+":"+m;});
const OUT_OPTS=Array.from({length:31},(_,i)=>{const t=(12*60)+i*30,h=Math.floor(t/60)%24,m=t%60;return String(h).padStart(2,"0")+":"+String(m).padStart(2,"0");});

function makeSelect(val,opts,onchange,disabled){
  const s=document.createElement("select");
  if(disabled){s.disabled=true;s.style.opacity="0.3";}
  const blank=document.createElement("option");blank.value="";blank.textContent="--:--";s.appendChild(blank);
  opts.forEach(t=>{const o=document.createElement("option");o.value=t;o.textContent=t;if(t===val)o.selected=true;s.appendChild(o);});
  s.addEventListener("change",()=>onchange(s.value));
  return s;
}

// ─── 保存表示 ───
function showSaved(){
  const el=document.getElementById("saveIndicator");
  const icon=document.getElementById("saveIcon");
  const txt=document.getElementById("saveTxt");
  el.style.color="#10b981";icon.textContent="✓";txt.textContent="保存済み";
  setTimeout(()=>{el.style.color="#334155";icon.textContent="☁";txt.textContent="";},2000);
}

// ─── 打刻タブ描画 ───
function renderRecord(){
  document.getElementById("periodLabel").textContent=getPeriodLabel(refDate);
  const tbody=document.getElementById("recordBody");
  tbody.innerHTML="";
  const dates=getDates(refDate);
  dates.forEach(date=>{
    const rec=records[date]||{};
    const absent=!!rec.absent;
    const hol=isHoliday(date),wknd=isWeekend(date);
    const calc=calcDay(rec.i||null,rec.o||null,date,absent);
    const isToday=date===TODAY;
    const isEditing=editRow===date;

    const tr=document.createElement("tr");
    if(isToday) tr.style.background="#1a2540";
    else if(wknd) tr.style.background="#1e1515";
    else if(hol) tr.style.background="#1e1a10";
    if(isToday) tr.id="today-row";

    // 日付セル
    const tdDate=document.createElement("td");
    tdDate.style.color=hol?"#fbbf24":wknd?"#f87171":"#e2e8f0";
    if(isToday){tdDate.style.fontWeight="700";const dot=document.createElement("span");dot.className="today-dot";tdDate.appendChild(dot);}
    tdDate.appendChild(document.createTextNode(fmtDate(date)));
    if(hol){const b=document.createElement("span");b.className="badge";b.textContent="祝";tdDate.appendChild(b);}
    tr.appendChild(tdDate);

    // 出勤
    const tdIn=document.createElement("td");
    if(wknd){tdIn.innerHTML='<span class="rest">休日</span>';}
    else if(isEditing){
      const inp=document.createElement("input");inp.className="manual-input";inp.value=rec.i||"";inp.placeholder="HH:MM";inp.maxLength=5;
      inp.addEventListener("change",()=>{setRec(date,{i:inp.value});});
      tdIn.appendChild(inp);
    }else{
      tdIn.appendChild(makeSelect(rec.i||"",IN_OPTS,v=>setRec(date,{i:v}),absent));
    }
    tr.appendChild(tdIn);

    // 退勤
    const tdOut=document.createElement("td");
    if(wknd){tdOut.innerHTML='<span class="rest">—</span>';}
    else if(absent){tdOut.innerHTML='<span class="rest" style="opacity:.3">—</span>';}
    else if(isEditing){
      const inp=document.createElement("input");inp.className="manual-input";inp.value=rec.o||"";inp.placeholder="HH:MM";inp.maxLength=5;
      inp.addEventListener("change",()=>{setRec(date,{o:inp.value});});
      tdOut.appendChild(inp);
    }else if(rec.o){
      tdOut.appendChild(makeSelect(rec.o,OUT_OPTS,v=>setRec(date,{o:v}),false));
    }else{
      const btn=document.createElement("button");btn.className="btn btn-out";btn.textContent="退勤";
      btn.addEventListener("click",()=>setRec(date,{o:nowRounded30(),absent:false}));
      tdOut.appendChild(btn);
    }
    tr.appendChild(tdOut);

    // 欠勤
    const tdAbs=document.createElement("td");
    if(wknd){tdAbs.innerHTML='<span class="rest">—</span>';}
    else{
      const btn=document.createElement("button");
      btn.className="btn "+(absent?"btn-absent-on":"btn-absent");
      btn.textContent=absent?"取消":"欠勤";
      btn.addEventListener("click",()=>{
        if(absent) setRec(date,{absent:false});
        else setRec(date,{absent:true,i:"",o:""});
      });
      tdAbs.appendChild(btn);
    }
    tr.appendChild(tdAbs);

    // 実働
    const tdWork=document.createElement("td");tdWork.className="num";
    if(wknd) tdWork.textContent="—";
    else if(absent){tdWork.innerHTML='<span style="color:#ef4444;font-size:12px">欠勤</span>';}
    else tdWork.textContent=calc?toHHMM(calc.workMin):"—";
    tr.appendChild(tdWork);

    // 残業/休出
    const tdOT=document.createElement("td");tdOT.className="num";
    if(wknd) tdOT.textContent="—";
    else if(calc?.holidayMin>0){tdOT.innerHTML='<span style="color:#fbbf24">休出 '+toHHMM(calc.holidayMin)+'</span>';}
    else if(calc?.otMin>0){tdOT.innerHTML='<span style="color:#f59e0b">+'+toHHMM(calc.otMin)+'</span>';}
    else if((calc?.absentDeduct||0)>0){tdOT.innerHTML='<span style="color:#64748b;font-size:11px">-8:00</span>';}
    else tdOT.textContent="—";
    tr.appendChild(tdOT);

    // 備考
    const tdNote=document.createElement("td");
    const wrap=document.createElement("div");wrap.style.cssText="display:flex;gap:4px;align-items:center";
    const noteInp=document.createElement("input");noteInp.className="note-input";noteInp.value=rec.n||"";noteInp.placeholder="メモ";noteInp.disabled=wknd;
    noteInp.addEventListener("change",()=>setRec(date,{n:noteInp.value}));
    wrap.appendChild(noteInp);
    if(!wknd){
      const editBtn=document.createElement("button");
      editBtn.className="edit-btn"+(isEditing?" on":"");
      editBtn.textContent=isEditing?"✓":"✎";
      editBtn.title=isEditing?"編集完了":"時刻を手入力で修正";
      editBtn.addEventListener("click",()=>{editRow=isEditing?null:date;renderRecord();});
      wrap.appendChild(editBtn);
    }
    tdNote.appendChild(wrap);
    tr.appendChild(tdNote);

    tbody.appendChild(tr);
  });

  // 今日行へスクロール
  setTimeout(()=>{const r=document.getElementById("today-row");if(r)r.scrollIntoView({behavior:"smooth",block:"center"});},100);
}

function setRec(date,patch){
  const prev=records[date]||{};
  records[date]={...prev,...patch};
  saveRec();
  renderRecord();
}

// ─── 集計タブ描画 ───
function renderSummary(){
  document.getElementById("periodLabel").textContent=getPeriodLabel(refDate);
  const dates=getDates(refDate);
  const summary=dates.map(date=>{
    const rec=records[date]||{};
    return{date,rec,calc:calcDay(rec.i||null,rec.o||null,date,!!rec.absent)};
  });

  const totalWork  =summary.reduce((a,s)=>a+(s.calc?.workMin||0),0);
  const totalOT    =summary.reduce((a,s)=>a+(s.calc?.otMin||0),0);
  const totalLN    =summary.reduce((a,s)=>a+(s.calc?.lnMin||0),0);
  const totalHol   =summary.reduce((a,s)=>a+(s.calc?.holidayMin||0),0);
  const totalAbsent=summary.reduce((a,s)=>a+(s.calc?.absentDeduct||0),0);
  const netOT=Math.max(0,totalOT-totalAbsent);
  const normalOT=netOT-Math.min(totalLN,netOT);
  const units=m=>Math.floor(m/30);
  const payOT_=units(normalOT)*(PAY_OT/2);
  const payLN_=units(Math.min(totalLN,netOT))*(PAY_LN/2);
  const payHol_=units(totalHol)*(PAY_HOL/2);
  const totalPay=payOT_+payLN_+payHol_;
  const totalOTPersonal=floor30(normalOT)+floor30(Math.min(totalLN,netOT))+floor30(totalHol);
  const personalPay=units(totalOTPersonal)*(PAY_PERSONAL/2);

  // カード
  const cards=[
    {label:"総実働時間",val:toHHMM(totalWork),unit:"h",color:"#4a9eff"},
    {label:"法定外残業",val:toHHMM(normalOT),unit:"h",color:"#f59e0b"},
    {label:"深夜残業",val:toHHMM(Math.min(totalLN,netOT)),unit:"h",color:"#8b5cf6"},
    {label:"休日出勤",val:toHHMM(totalHol),unit:"h",color:"#fbbf24"},
    {label:"欠勤控除",val:toHHMM(totalAbsent),unit:"h",color:"#ef4444"},
    {label:"請求残業代合計",val:"¥"+totalPay.toLocaleString(),unit:"",color:"#10b981",big:true},
    {label:"個人受取残業代",val:"¥"+personalPay.toLocaleString(),unit:"",color:"#38bdf8",big:true},
  ];
  const cardGrid=document.getElementById("summaryCards");
  cardGrid.innerHTML="";
  cards.forEach(c=>{
    cardGrid.innerHTML+=`<div class="card" style="border-top:3px solid ${c.color}">
      <div class="card-label">${c.label}</div>
      <div class="card-val${c.big?" big":""}" style="color:${c.color}">${c.val}<span class="card-unit">${c.unit}</span></div>
    </div>`;
  });

  // 請求内訳
  document.getElementById("breakBox").innerHTML=`
    <div class="box-title">残業代内訳（請求額）</div>
    <div class="brow"><span class="brow-label">法定外残業 ${toHHMM(normalOT)}h × ¥5,850/h</span><span class="brow-val">¥${payOT_.toLocaleString()}</span></div>
    <div class="brow"><span class="brow-label">深夜残業 ${toHHMM(Math.min(totalLN,netOT))}h × ¥7,310/h</span><span class="brow-val">¥${payLN_.toLocaleString()}</span></div>
    <div class="brow"><span class="brow-label">休日出勤 ${toHHMM(totalHol)}h × ¥7,310/h</span><span class="brow-val">¥${payHol_.toLocaleString()}</span></div>
    <div class="break-total" style="color:#10b981"><span>請求合計</span><span>¥${totalPay.toLocaleString()}</span></div>`;

  // 個人受取
  document.getElementById("personalBox").innerHTML=`
    <div class="box-title">残業代内訳（個人受取・一律¥4,100/h）</div>
    <div class="brow"><span class="brow-label">残業合計 ${toHHMM(totalOTPersonal)}h（法定外＋深夜＋休出）× ¥4,100/h</span><span class="brow-val">¥${personalPay.toLocaleString()}</span></div>
    <div class="break-total" style="color:#38bdf8"><span>個人受取合計</span><span>¥${personalPay.toLocaleString()}</span></div>`;

  // 差額
  document.getElementById("diffCard").innerHTML=`
    <span style="color:#64748b;font-size:13px">差額（請求 − 個人）</span>
    <span style="color:#94a3b8;font-weight:700;font-size:15px">¥${(totalPay-personalPay).toLocaleString()}</span>`;

  // 日別明細
  const filtered=summary.filter(s=>s.rec.i||s.rec.o||s.rec.absent);
  let rows="";
  filtered.forEach(({date,rec,calc})=>{
    const hol=isHoliday(date),wknd=isWeekend(date),absent=!!rec.absent;
    const typeLabel=absent?"欠勤":hol?"祝日":wknd?"休日":"平日";
    const typeColor=absent?"#ef4444":hol?"#fbbf24":wknd?"#f87171":"#94a3b8";
    const dateColor=hol?"#fbbf24":wknd?"#f87171":"#e2e8f0";
    const showDeduct=(calc?.absentDeduct||0)>0;
    let otCell="—";
    if(calc?.holidayMin>0) otCell=`<span style="color:#fbbf24">${toHHMM(calc.holidayMin)}</span>`;
    else if(calc?.otMin>0) otCell=`<span style="color:#f59e0b">${toHHMM(calc.otMin)}</span>`;
    else if(showDeduct) otCell=`<span style="color:#64748b">-8:00</span>`;
    let lnCell=calc?.lnMin>0?`<span style="color:#8b5cf6">${toHHMM(calc.lnMin)}</span>`:"—";
    rows+=`<tr>
      <td style="color:${dateColor}">${fmtDate(date)}</td>
      <td style="color:${typeColor};font-weight:600;font-size:12px">${typeLabel}</td>
      <td>${rec.i||"—"}</td><td>${rec.o||"—"}</td>
      <td class="num">${absent?"欠勤":calc?toHHMM(calc.workMin):"—"}</td>
      <td class="num">${otCell}</td>
      <td class="num">${lnCell}</td>
      <td style="color:#64748b;font-size:12px">${rec.n||""}</td>
    </tr>`;
  });
  document.getElementById("detailBox").innerHTML=`
    <div class="box-title">日別明細（打刻済み／欠勤のみ）</div>
    <div class="table-wrap"><table>
      <thead><tr><th>日付</th><th>種別</th><th>出勤</th><th>退勤</th><th>実働</th><th>残業/休出</th><th>深夜</th><th>備考</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;

  // CSV/Excel用にsummaryを保持
  window._summary=summary;
  window._totals={totalWork,normalOT,totalLN,netOT,totalHol,totalAbsent,totalPay,personalPay,payOT_,payLN_,payHol_,totalOTPersonal};
}

// ─── タブ切替 ───
function switchTab(t){
  currentTab=t;
  document.getElementById("page-record").style.display=t==="record"?"":"none";
  document.getElementById("page-summary").style.display=t==="summary"?"":"none";
  document.getElementById("tab-record").className="tab"+(t==="record"?" active":"");
  document.getElementById("tab-summary").className="tab"+(t==="summary"?" active":"");
  if(t==="record") renderRecord();
  else renderSummary();
}

function shiftPeriod(dir){
  refDate=shiftRef(refDate,dir);
  if(currentTab==="record") renderRecord();
  else renderSummary();
}

// ─── CSV ───
function downloadCSV(){
  const{summary:s}=window,{totalWork,normalOT,totalLN,netOT,totalHol,totalPay,payOT_,payLN_,payHol_}=window._totals;
  const rows=[
    ["期間",getPeriodLabel(refDate)],[],
    ["日付","種別","出勤","退勤","実働(h)","残業/休出(h)","深夜残業(h)","備考"],
    ...window._summary.map(({date,rec,calc})=>{
      const hol=isHoliday(date),wknd=isWeekend(date),absent=!!rec.absent;
      const type=absent?"欠勤":hol?"祝日":wknd?"休日":"平日";
      const work=absent?"欠勤":calc?toHHMM(calc.workMin):"";
      const ot=calc?.holidayMin>0?toHHMM(calc.holidayMin):calc?.otMin>0?toHHMM(calc.otMin):(calc?.absentDeduct||0)>0?"-8:00":"";
      const ln=calc?.lnMin>0?toHHMM(calc.lnMin):"";
      return[fmtDate(date),type,rec.i||"",rec.o||"",work,ot,ln,rec.n||""];
    }),
    [],[" 【集計】"],
    ["総実働時間",toHHMM(totalWork)+"h"],
    ["法定外残業",toHHMM(normalOT)+"h","×¥5,850/h","¥"+payOT_.toLocaleString()],
    ["深夜残業",toHHMM(Math.min(totalLN,netOT))+"h","×¥7,310/h","¥"+payLN_.toLocaleString()],
    ["休日出勤",toHHMM(totalHol)+"h","×¥7,310/h","¥"+payHol_.toLocaleString()],
    ["残業代合計（請求）","","","¥"+totalPay.toLocaleString()],
  ];
  const csv=rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8;"}));
  a.download="勤怠_"+getPeriodLabel(refDate).replace(/[〜年月日\s]/g,"_")+".csv";a.click();
}

// ─── Excel ───
function exportXLSX(){
  const{payOT_,payLN_,payHol_,totalPay,normalOT,totalLN,netOT,totalHol,totalWork,totalAbsent}=window._totals;
  const rows=window._summary.map(({date,rec,calc})=>{
    const hol=isHoliday(date),wknd=isWeekend(date),absent=!!rec.absent;
    return{
      "日付":fmtDate(date),"種別":absent?"欠勤":hol?"祝日":wknd?"休日":"平日",
      "出勤":rec.i||"","退勤":rec.o||"",
      "実働":calc&&!absent?toHHMM(calc.workMin):absent?"欠勤":"",
      "法定外残業":calc?.otMin>0?toHHMM(calc.otMin):"",
      "深夜残業":calc?.lnMin>0?toHHMM(calc.lnMin):"",
      "休日出勤":calc?.holidayMin>0?toHHMM(calc.holidayMin):"",
      "欠勤控除":(calc?.absentDeduct||0)>0?"-8:00":"","メモ":rec.n||""
    };
  });
  rows.push({});
  rows.push({"日付":"【合計】","実働":toHHMM(totalWork),"法定外残業":toHHMM(normalOT),
    "深夜残業":toHHMM(Math.min(totalLN,netOT)),"休日出勤":toHHMM(totalHol),
    "欠勤控除":toHHMM(totalAbsent),"メモ":"残業代合計 ¥"+totalPay.toLocaleString()});
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[14,6,8,8,8,12,10,10,10,20].map(w=>({wch:w}));
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"勤怠");
  const{s,e}=getPeriodRange(refDate);
  const f=d=>d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0");
  XLSX.writeFile(wb,"勤怠_"+f(s)+"-"+f(e)+".xlsx");
}

// ─── 起動 ───
initRecords();
renderRecord();
</script>
